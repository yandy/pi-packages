name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Determine package directory
        id: info
        run: |
          TAG="${{ github.event.release.tag_name }}"
          case "$TAG" in
            pi-ask-user-v*)
              echo "dir=pi-ask-user" >> "$GITHUB_OUTPUT"
              ;;
            pi-container-sandbox-v*)
              echo "dir=pi-container-sandbox" >> "$GITHUB_OUTPUT"
              ;;
            pi-web-tools-v*)
              echo "dir=pi-web-tools" >> "$GITHUB_OUTPUT"
              ;;
            pi-coding-tools-v*)
              echo "dir=pi-coding-tools" >> "$GITHUB_OUTPUT"
              ;;
            pi-todo-v*)
              echo "dir=pi-todo" >> "$GITHUB_OUTPUT"
              ;;
            pi-vision-tools-v*)
              echo "dir=pi-vision-tools" >> "$GITHUB_OUTPUT"
              ;;
            pi-lark-v*)
              echo "dir=pi-lark" >> "$GITHUB_OUTPUT"
              ;;
            pi-dingtalk-v*)
              echo "dir=pi-dingtalk" >> "$GITHUB_OUTPUT"
              ;;
            pi-permission-system-v*)
              echo "dir=pi-permission-system" >> "$GITHUB_OUTPUT"
              ;;
            pi-memory-v*)
              echo "dir=pi-memory" >> "$GITHUB_OUTPUT"
              ;;
            pi-subagents-v*)
              echo "dir=pi-subagents" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - run: npm ci

      - run: npm publish --provenance --workspace=${{ steps.info.outputs.dir }}
