name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Determine package directory
        id: info
        run: |
          TAG="${{ github.event.release.tag_name }}"
          case "$TAG" in
            pi-container-sandbox-v*)
              echo "dir=pi-container-sandbox" >> "$GITHUB_OUTPUT"
              ;;
            pi-web-tools-v*)
              echo "dir=pi-web-tools" >> "$GITHUB_OUTPUT"
              ;;
            pi-coding-tools-v*)
              echo "dir=pi-coding-tools" >> "$GITHUB_OUTPUT"
              ;;
            pi-todo-v*)
              echo "dir=pi-todo" >> "$GITHUB_OUTPUT"
              ;;
            pi-vision-tools-v*)
              echo "dir=pi-vision-tools" >> "$GITHUB_OUTPUT"
              ;;
            pi-lark-v*)
              echo "dir=pi-lark" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - run: npm ci

      - run: npm publish --provenance --workspace=${{ steps.info.outputs.dir }}
