name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter-packages.outputs.packages }}
      has_root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            root:
              - "package.json"
              - "package-lock.json"
              - "tsconfig.base.json"
              - "vitest.config.ts"
              - "biome.json"
            pi-ask-user:
              - "pi-ask-user/**"
            pi-container-sandbox:
              - "pi-container-sandbox/**"
            pi-web-tools:
              - "pi-web-tools/**"
            pi-coding-tools:
              - "pi-coding-tools/**"
            pi-permission-system:
              - "pi-permission-system/**"
            pi-subagents:
              - "pi-subagents/**"
            pi-todo:
              - "pi-todo/**"
            pi-vision-tools:
              - "pi-vision-tools/**"
            pi-lark:
              - "pi-lark/**"
            pi-dingtalk:
              - "pi-dingtalk/**"
            pi-memory:
              - "pi-memory/**"
      - id: filter-packages
        run: echo "packages=$(echo '${{ steps.filter.outputs.changes }}' | jq -c 'map(select(. != "root"))')" >> "$GITHUB_OUTPUT"

  test-full:
    needs: changes
    if: needs.changes.outputs.has_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck && npm run lint && npm test

  test-packages:
    needs: changes
    if: needs.changes.outputs.has_root != 'true' && needs.changes.outputs.packages != '[]' && needs.changes.outputs.packages != ''
    strategy:
      matrix:
        package: ${{ fromJson(needs.changes.outputs.packages) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: |
          npm run typecheck -w "${{ matrix.package }}" --if-present
          npm run lint -w "${{ matrix.package }}" --if-present
          npm test -w "${{ matrix.package }}" --if-present
