name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            root:
              - "package.json"
              - "package-lock.json"
              - "tsconfig.base.json"
              - "vitest.config.ts"
              - "biome.json"
            pi-ask-user:
              - "pi-ask-user/**"
            pi-container-sandbox:
              - "pi-container-sandbox/**"
            pi-web-tools:
              - "pi-web-tools/**"
            pi-coding-tools:
              - "pi-coding-tools/**"
            pi-permission-system:
              - "pi-permission-system/**"
            pi-subagents:
              - "pi-subagents/**"
            pi-todo:
              - "pi-todo/**"
            pi-vision-tools:
              - "pi-vision-tools/**"

  test:
    needs: changes
    if: needs.changes.outputs.packages != '[]' && needs.changes.outputs.packages != ''
    strategy:
      matrix:
        package: ${{ fromJson(needs.changes.outputs.packages) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - if: matrix.package != 'root'
        run: npm run typecheck -w ${{ matrix.package }} --if-present
      - if: matrix.package != 'root'
        run: npm run lint -w ${{ matrix.package }} --if-present
      - if: matrix.package != 'root'
        run: npm test -w ${{ matrix.package }} --if-present
